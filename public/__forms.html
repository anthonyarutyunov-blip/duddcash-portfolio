<!-- Hidden page for Netlify Forms detection — Netlify's build bot scans this during deploy -->
<html><head><title>Forms Detection</title></head><body>
<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input name="form-name" type="hidden" value="contact" />
  <input name="bot-field" />
  <input name="name" />
  <input name="organization" />
  <input name="email" />
  <input name="phone" />
  <input name="budget" />
  <input name="timeline" />
  <input name="referral" />
  <textarea name="message"></textarea>
</form>
</body></html>
