[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/layout-overrides.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/duddcash-layout.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Private pitch pages — served dynamically by a function (200 rewrite keeps
# the /p/<slug> path). NOTE: [[headers]] blocks below do NOT apply to
# function responses — pitch-page.mts sets its own headers.
[[redirects]]
  from = "/p/*"
  to = "/.netlify/functions/pitch-page"
  status = 200

# The static viewer shell (fetched + rewritten by pitch-page.mts) must never
# be indexed or cached long
[[headers]]
  for = "/pitch-viewer/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache"

# Safety net: /v/<id> pages are pre-built per project at deploy time. If a
# share link points at a project added in the editor AFTER the last deploy,
# no static page exists yet — redirect to the homepage deep-link instead of
# 404ing. (Non-forced: only applies when no static file matches.)
[[redirects]]
  from = "/v/*"
  to = "/?project=:splat"
  status = 302
